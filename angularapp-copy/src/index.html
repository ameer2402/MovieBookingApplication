            "error": "#ffb4ab",
            "surface-variant": "#353534",
            "surface-dim": "#131313",
            "on-primary-container": "#fff7f6",

            "on-secondary-fixed-variant": "#00504d",

          }
        },
        animation: {
          "flip-in": "flip-in 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards",
          "slide-up-fade": "slide-up-fade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards",

        border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .hero-scrim {
        background: linear-gradient(0deg, #0F0F0F 0%, rgba(15, 15, 15, 0.4) 50%, rgba(15, 15, 15, 0) 100%);

    .horizontal-scroll::-webkit-scrollbar { display: none; }
    .horizontal-scroll { -ms-overflow-style: none; scrollbar-width: none; }
