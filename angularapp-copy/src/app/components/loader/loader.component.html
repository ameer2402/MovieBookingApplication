<div class="loader-container" *ngIf="loaderService.isLoading | async">
  <div class="glow-bar"></div>
  <div class="spinner-container" [ngSwitch]="loaderService.context | async">
    
    <!-- CONTEXT: MOVIE (Vintage Projector) -->
    <ng-container *ngSwitchCase="'MOVIE'">
      <svg class="film-reel-spinner" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
        <polyline points="17 2 12 7 7 2"></polyline>
        <circle cx="12" cy="14" r="4"></circle>
      </svg>
      <span class="loading-text">ROLLING THE FILM...</span>
    </ng-container>

    <!-- CONTEXT: AUTH (Ticket Punch) -->
    <ng-container *ngSwitchCase="'AUTH'">
      <svg class="ticket-spinner" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"></path>
        <line x1="9" y1="9" x2="9" y2="15"></line>
        <line x1="15" y1="9" x2="15" y2="15"></line>
      </svg>
      <span class="loading-text">VALIDATING VIP PASS...</span>
    </ng-container>

    <!-- CONTEXT: TICKET (Booking / Popcorn) -->
    <ng-container *ngSwitchCase="'TICKET'">
      <svg class="popcorn-spinner" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="6 10 18 10 16 22 8 22 6 10"></polygon>
        <path d="M7 10C7 7.5 9 6 12 6s5 1.5 5 4"></path>
        <path d="M9 6C9 4 10 2 12 2s3 2 3 4"></path>
      </svg>
      <span class="loading-text">RESERVING YOUR SEAT...</span>
    </ng-container>

    <!-- CONTEXT: DEFAULT (Film Reel) -->
    <ng-container *ngSwitchDefault>
      <svg class="film-reel-spinner" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="12" r="2"></circle>
        <line x1="12" y1="2" x2="12" y2="4"></line>
        <line x1="12" y1="20" x2="12" y2="22"></line>
        <line x1="22" y1="12" x2="20" y2="12"></line>
        <line x1="4" y1="12" x2="2" y2="12"></line>
        <line x1="19.07" y1="4.93" x2="17.66" y2="6.34"></line>
        <line x1="6.34" y1="17.66" x2="4.93" y2="19.07"></line>
        <line x1="19.07" y1="19.07" x2="17.66" y2="17.66"></line>
        <line x1="6.34" y1="6.34" x2="4.93" y2="4.93"></line>
      </svg>
      <span class="loading-text">PREPARING CINEMA...</span>
    </ng-container>

  </div>
</div>
