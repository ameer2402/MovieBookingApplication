<div class="container">
    <h1>Movie Management</h1>
  
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
  
    <div class="movies-grid">
      <div *ngFor="let movie of movies" class="movie-card">
        <div class="movie-image">
          <img 
            [src]="$any(movie).posterBase64 ? $any(movie).posterBase64 : ('https://image.pollinations.ai/prompt/movie%20poster%20for%20' + movie.title + '?width=400&height=600&nologo=true')" 
            alt="{{ movie.title }}"
            onerror="this.src='https://via.placeholder.com/400x600?text=Movie+Poster'"
            class="object-cover w-full h-full"
          >
        </div>
        
        <div class="movie-details">
          <h2>{{ movie.title }}</h2>
          
          <div class="detail-row">
            <strong>Genre:</strong> 
            <span>{{ movie.genre }}</span>
          </div>
          
          <div class="detail-row">
            <strong>Date & Time:</strong> 
            <span>{{ movie.showDate | date:'MMM d, yyyy' }} at {{ movie.showTime }}</span>
          </div>
          
          <div class="detail-row">
            <strong>Duration:</strong> 
            <span>{{ movie.duration }} minutes</span>
          </div>
          
          <div class="detail-row">
            <strong>Ticket Price:</strong> 
            <span>₹{{ movie.price }}</span>
          </div>
          
          <div class="detail-row">
            <strong>Total Seats:</strong> 
            <span>{{ movie.totalSeats }}</span>
          </div>
          
          <div class="movie-actions">
            <button 
              class="btn btn-book" 
              (click)="navigateToBooking(movie.id)"
            >
              Book Movie
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
